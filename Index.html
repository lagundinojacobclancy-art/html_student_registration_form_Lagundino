<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Registration Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Galaxy background elements -->
    <div class="stars"></div>
    <div class="twinkling"></div>
    <div class="clouds"></div>

    <div class="nebula-1"></div>
    <div class="nebula-2"></div>

    <div class="form-container">
        <header>
            <div class="portal-badge">P O R T A L // O P E N</div>
            <h1>Register Here My Cute Little Gay Boy</h1>
            <p class="subtitle">Enter your coordinates to begin the journey</p>
        </header>

        <main>
            <form action="registration_success.html" method="post">
                <div class="input-group">
                    <input type="text" id="username" name="username" required placeholder=" " minlength="5"
                        maxlength="15">
                    <label for="username">Enter your name
                    </label>
                    <div class="input-glow"></div>
                </div>

                <div class="input-group">
                    <input type="password" id="password" name="password" required placeholder=" " minlength="8">
                    <label for="password">Create Password</label>
                    <div class="input-glow"></div>
                </div>

                <div class="input-group">
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder=" "
                        minlength="8">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="input-glow"></div>
                </div>

                <div class="checkbox-group">
                    <label class="galaxy-checkbox">
                        <input type="checkbox" id="terms" name="terms" required>
                        <span class="checkmark"></span>
                        <span class="checkbox-text">I align with the <a href="#">Intergalactic Directives</a></span>
                    </label>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">
                        <span>☄ Login</span>
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <span>Gay 🚀</span>
                        <div class="btn-stars"></div>
                    </button>
                    <button type="reset" class="btn btn-tertiary">
                        <span>Exit</span>
                    </button>5
            </form>
        </main>
        <footer>Milky Way Sector 7G &copy; Clancy Lagundino</footer>
    </div>
</body>

</html>
